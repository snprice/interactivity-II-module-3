<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Function Demo</title>
<link rel="stylesheet" href="styles.css"> <!-- Link to external CSS file if you have one-->

</head>
<body>

<p id="demo"></p>

<script>
    function addition(a, b, c, d) {
    return a + b + c + d;
    }

    let result = addition(3, 3, 3, 3);

    document.getElementById("demo").innerHTML = "The result is " + result;
</script>


</body>
</html>
