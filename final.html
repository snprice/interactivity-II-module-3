<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>

<br>
<br>

<div class="banner"></div>

width="40px" height="40px"></img>

<center>
    <div class="searchbar"></div>

    <div class="white"></div>
</center>

<div class="black"></div>

width="50px" height="50px"></img>

<p class="welcome">Welcome!</p>

<br>
<br>

<center>

    <button onclick="popUp(this.value)"

    <button onclick="popUp(this.value)" class="addcart" 
    value="Doesn't their CEO donate to alt-right politicians? I think I read an article about that...">

    <img class="items" src="images/phone.jpg"></img>

    <button onclick="popUp(this.value)" class="addcart" 
    value="I'm pretty sure I saw that this company is funding genocide...">
    AnyFone Unbreakable Phone Case Rainbow</button>
</div>

<br>
<br>

<button class="checkout" onclick="checkOut()">Check Out</button>

<br>

<a class="alternate" href="/alternate.html">it's not the only option</a>

<script>
function popUp(value) {
    alert(value);
}

function checkOut() {
    alert("I don't want to give money to any of these companies... but it's like every option is bad. What am I supposed to do?");
}
</script>

</center>
