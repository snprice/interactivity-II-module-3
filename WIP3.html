<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WIP 1: Prototype</title>
<link rel="stylesheet" href="styles.css"> <!-- Link to external CSS file if you have one-->
</head>
<body>

<br>
<br>

<div class="banner"></div>

<img class="search" src="images/search.jpg"
width="40px" height="40px"></img>

<center>
    <div class="searchbar"></div>

    <div class="white"></div>
</center>

<div class="black"></div>

<img class="cart" src="images/shoppingcart.png"
width="50px" height="50px"></img>

<p class="welcome">Welcome!</p>

<p class="suggestion">Here's some great finds we think you'll like:</p>

<br>
<br>

<center>

<div class="options">
    <img class="items" src="images/dress.jpg"></img>

    <button onclick="popUp(this.value)" 
    class="addcart"
    value="message">
    STTYLiZ Womens Summer Dresses Casual</button>

    <img class="items" src="images/gummies.jpg"></img>

    <button onclick="popUp(this.value)" class="addcart" 
    value="Fre-SH message">
    Fre-SH Delicious Natural Fruit Gummies</button>

    <img class="items" src="images/utensils.jpg"></img>

    <button onclick="popUp(this.value)" class="addcart" 
    value="GoodHome message">
    Kitchen Wodden Utensil Set GoodHome Brand</button>

    <img class="items" src="images/phone.jpg"></img>

    <button onclick="popUp(this.value)" class="addcart" 
    value="FastBurger message ">AnyFone Unbreakable Phone Case Rainbow</button>
</div>

<br>
<br>

<button class="checkout" onclick="checkOut()">Check Out</button>

<script>
function popUp(value) {
    alert(value);
}

function checkOut() {
    alert("Are you sure? You're a bad person if you give them money. Try choosing a non-problematic option!");
}
</script>

</center>
</body>
</html>
